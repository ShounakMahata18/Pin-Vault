<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <style>
            .container {
                width: 240px;
                padding: 16px;
                font-family: sans-serif;
                text-align: center;
            }
            h3 {
                margin: 0 0 12px;
            }
            input {
                width: 100%;
                box-sizing: border-box;
                padding: 9px;
                margin-bottom: 8px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-size: 14px;
            }
            button {
                width: 100%;
                padding: 10px;
                background: #2563eb;
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                margin-bottom: 6px;
            }
            button:hover {
                background: #1d4ed8;
            }
            button:disabled {
                background: #93c5fd;
                cursor: not-allowed;
            }
            .link {
                background: none;
                color: #2563eb;
                text-decoration: underline;
                padding: 4px;
                font-size: 12px;
            }
            .link:hover {
                background: none;
                color: #1d4ed8;
            }
            .email-badge {
                font-size: 12px;
                color: #374151;
                margin-bottom: 10px;
                word-break: break-all;
            }
            #status,
            #timer {
                font-size: 12px;
                min-height: 16px;
                margin: 6px 0 0;
            }
            #status.ok {
                color: #16a34a;
            }
            #status.err {
                color: #dc2626;
            }
            #timer {
                color: #6b7280;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h3>Pin vault</h3>
            <!-- popup.js renders the right screen into here -->
            <div id="app"></div>
            <p id="status"></p>
        </div>

        <script type="module" src="popup.js"></script>
    </body>
</html>
